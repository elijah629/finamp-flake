name: Update Finamp

on:
  workflow_dispatch:
  schedule:
    - cron: "27 8 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh upstream lock and dependency metadata
        run: ./update.sh

      - name: Verify package still builds
        run: nix build .#finamp

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update Finamp redesign pin"
          title: "chore: update Finamp redesign pin"
          body: |
            Automated update for:
            - `flake.lock`
            - `pubspec.lock.json`
            - `git-hashes.json`
          branch: automation/update-finamp
          delete-branch: true
