name: Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update
        run: nix run .#update-finamp

      - name: Build
        run: nix build .#finamp

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        id: pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update flake"
          title: "chore: update flake"
          body: |
            Automated update for:
            - `flake.lock`
            - `pubspec.lock.json`
            - `git-hashes.json`
          branch: automation/update-finamp
          delete-branch: true

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.pr.outputs.pull-request-number }} --auto --squash --delete-branch
