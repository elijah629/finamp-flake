name: Update Finamp

on:
  workflow_dispatch:
  schedule:
    - cron: "27 8 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip off-weeks
        id: cadence
        run: |
          week="$(date -u +%V)"
          if [ $((10#$week % 2)) -ne 0 ]; then
            echo "run_update=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ISO week $week"
          else
            echo "run_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh upstream lock and dependency metadata
        if: steps.cadence.outputs.run_update == 'true'
        run: ./update.sh

      - name: Verify package still builds
        if: steps.cadence.outputs.run_update == 'true'
        run: nix build .#finamp

      - name: Create pull request
        if: steps.cadence.outputs.run_update == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update flake"
          title: "chore: update flake"
          body: |
            Automated update for:
            - `flake.lock`
            - `pubspec.lock.json`
            - `git-hashes.json`
          branch: automation/update-finamp
          delete-branch: true
